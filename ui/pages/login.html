{% extends "_layout.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
  <h2 class="text-xl font-bold mb-3">Log in</h2>
  <form action="/api/login" method="post" class="space-y-3" data-test-id="form-login">
    <div>
      <label class="block text-sm mb-1">Email</label>
      <input type="email" name="email" required data-test-id="input-email"
             class="w-full border rounded px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm mb-1">Password</label>
      <input type="password" name="password" required data-test-id="input-password"
             class="w-full border rounded px-3 py-2" />
    </div>
    <button type="submit" data-test-id="btn-login"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white py-2 rounded font-bold">
      Log in
    </button>
  </form>
  <div class="mt-4 text-xs text-slate-500 bg-slate-50 p-3 rounded">
    <b>Demo credentials</b>: alice@example.com / password123
  </div>
</div>
{% endblock %}
